<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="../index.html" class="logo">Anjos de Resgate</a>
      <button id="admin-logout" class="btn btn-secondary">Sair</button>
    </div>
  </header>

  <main class="section">
    <h1>Painel do moderador</h1>

    <section class="admin-section">
      <h2>Animais</h2>

      <div class="admin-filters">
        <input id="pet-search" type="text" placeholder="Buscar pet">
        <select id="pet-filter-especie">
          <option value="">Todas as espécies</option>
          <option value="Cachorro">Cachorro</option>
          <option value="Gato">Gato</option>
        </select>
        <select id="pet-filter_porte">
          <option value="">Todos os portes</option>
          <option value="Pequeno">Pequeno</option>
          <option value="Médio">Médio</option>
          <option value="Grande">Grande</option>
        </select>
      </div>

      <form id="pet-form">
        <input type="hidden" name="id">
        <input name="nome" placeholder="Nome" required>
        <input name="especie" placeholder="Espécie" required>
        <input name="idade" placeholder="Idade">
        <input name="porte" placeholder="Porte">
        <input name="genero" placeholder="Gênero">
        <label><input type="checkbox" name="vacinada"> Vacinado</label>
        <label><input type="checkbox" name="castrada"> Castrado</label>
        <textarea name="historia" placeholder="História"></textarea>
        <textarea name="imagens" placeholder="Uma URL por linha"></textarea>
        <button type="submit" class="btn btn-primary">Salvar pet</button>
      </form>

      <div id="pet-list"></div>
    </section>

    <section class="admin-section">
      <h2>Itens de doação</h2>

      <form id="donation-item-form">
        <input type="hidden" name="id">
        <input name="nome" placeholder="Nome do item" required>
        <textarea name="descricao" placeholder="Descrição"></textarea>
        <input name="quantidade" type="number" placeholder="Quantidade">
        <input name="categoria" placeholder="Categoria">
        <button type="submit" class="btn btn-primary">Salvar item</button>
      </form>

      <div id="donation-item-list"></div>
    </section>

    <section class="admin-section">
      <h2>Intenções de doação</h2>
      <div id="donation-intents-list"></div>
    </section>

    <section class="admin-section">
      <h2>Animais perdidos / achados</h2>

      <input id="lost-admin-search" type="text" placeholder="Buscar">
      <select id="lost-admin-species">
        <option value="">Todas as espécies</option>
        <option value="Cachorro">Cachorro</option>
        <option value="Gato">Gato</option>
        <option value="Ave">Ave</option>
        <option value="Equino">Equino</option>
        <option value="Coelho">Coelho</option>
      </select>
      <select id="lost-admin-status">
        <option value="">Todos</option>
        <option value="pending">Pendente</option>
        <option value="approved">Aprovado</option>
        <option value="rejected">Recusado</option>
        <option value="found">Encontrado</option>
      </select>

      <div id="lost-admin-list"></div>
    </section>
  </main>

  <script src="../script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof initAdminDashboardPage === 'function') initAdminDashboardPage();
    });
  </script>
</body>
</html>
